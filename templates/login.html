{% extends 'base.html' %}

{% block title %}
Login | CityMate
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-5 col-md-7">

        <div class="login-card">

            <div class="text-center mb-4">

                <i class="fas fa-user-circle login-icon"></i>

                <h2 class="fw-bold mt-3">
                    Welcome Back
                </h2>

                <p class="text-muted">
                    Login to access CityMate services
                </p>

            </div>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Email Address
                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="Enter your email"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter your password"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100 login-btn">

                    <i class="fas fa-sign-in-alt"></i>
                    Login

                </button>

            </form>

            <div class="text-center mt-4">

                <p>
                    Don't have an account?

                    <a href="/register">
                        Register Here
                    </a>
                </p>

            </div>

        </div>

    </div>

</div>

<style>

.login-card{
    background:white;
    border-radius:25px;
    padding:40px;
    box-shadow:0 10px 35px rgba(0,0,0,0.12);
}

.login-icon{
    font-size:70px;
    color:#2563eb;
}

.form-control{
    border-radius:12px;
    padding:12px;
}

.login-btn{
    border-radius:12px;
    padding:12px;
    font-size:18px;
    font-weight:600;
}

.login-btn:hover{
    transform:translateY(-2px);
    transition:0.3s;
}

@media(max-width:768px){

    .login-card{
        padding:25px;
    }

}

</style>

{% endblock %}
