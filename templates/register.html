{% extends 'base.html' %}

{% block title %}
Register | CityMate
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-6 col-md-8">

        <div class="register-card">

            <div class="text-center mb-4">

                <i class="fas fa-user-plus register-icon"></i>

                <h2 class="mt-3 fw-bold">
                    Create Account
                </h2>

                <p class="text-muted">
                    Join CityMate and stay connected with your city
                </p>

            </div>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Full Name
                    </label>

                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        placeholder="Enter your full name"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Email Address
                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="Enter your email"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Create a password"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100 register-btn">

                    Create Account

                </button>

            </form>

            <div class="text-center mt-4">

                <p>
                    Already have an account?

                    <a href="/login">
                        Login Here
                    </a>
                </p>

            </div>

        </div>

    </div>

</div>

<style>

.register-card{
    background:white;
    border-radius:25px;
    padding:40px;
    box-shadow:0 10px 35px rgba(0,0,0,0.12);
}

.register-icon{
    font-size:60px;
    color:#2563eb;
}

.form-control{
    border-radius:12px;
    padding:12px;
}

.register-btn{
    border-radius:12px;
    padding:12px;
    font-size:18px;
    font-weight:600;
}

.register-btn:hover{
    transform:translateY(-2px);
    transition:0.3s;
}

@media(max-width:768px){

    .register-card{
        padding:25px;
    }

}

</style>

{% endblock %}
