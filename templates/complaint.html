{% extends 'base.html' %}

{% block title %}
File Complaint | CityMate
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="complaint-card">

            <div class="text-center mb-4">

                <i class="fas fa-exclamation-circle complaint-icon"></i>

                <h2 class="fw-bold mt-3">
                    Submit Public Complaint
                </h2>

                <p class="text-muted">
                    Report civic issues and help improve your city.
                </p>

            </div>

            <form method="POST">

                <!-- Complaint Title -->

                <div class="mb-3">

                    <label class="form-label">
                        Complaint Title
                    </label>

                    <input
                        type="text"
                        name="title"
                        class="form-control"
                        placeholder="Enter complaint title"
                        required>

                </div>

                <!-- Category -->

                <div class="mb-3">

                    <label class="form-label">
                        Category
                    </label>

                    <select
                        name="category"
                        class="form-select"
                        required>

                        <option value="">
                            Select Category
                        </option>

                        <option>
                            Road Damage
                        </option>

                        <option>
                            Street Light
                        </option>

                        <option>
                            Garbage Collection
                        </option>

                        <option>
                            Water Supply
                        </option>

                        <option>
                            Electricity Issue
                        </option>

                        <option>
                            Traffic Problem
                        </option>

                        <option>
                            Public Safety
                        </option>

                        <option>
                            Other
                        </option>

                    </select>

                </div>

                <!-- Description -->

                <div class="mb-4">

                    <label class="form-label">
                        Complaint Description
                    </label>

                    <textarea
                        name="description"
                        rows="6"
                        class="form-control"
                        placeholder="Describe the issue in detail..."
                        required></textarea>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100 submit-btn">

                    <i class="fas fa-paper-plane"></i>
                    Submit Complaint

                </button>

            </form>

        </div>

    </div>

</div>

<style>

.complaint-card{
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.10);
}

.complaint-icon{
    font-size:70px;
    color:#dc3545;
}

.form-control,
.form-select{
    border-radius:12px;
    padding:12px;
}

.submit-btn{
    padding:14px;
    border-radius:12px;
    font-size:18px;
    font-weight:600;
}

.submit-btn:hover{
    transform:translateY(-2px);
    transition:0.3s;
}

@media(max-width:768px){

    .complaint-card{
        padding:25px;
    }

}

</style>

{% endblock %}
